services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

  app:
    build: .
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      - SECRET_KEY=django-insecure-key-for-github
      - DEBUG=True
      - HOST=db
      - NAME=postgres
      - USER=postgres
      - PASSWORD=postgres
      - PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0

  celery:
    build: .
    command: python -m celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - host=db
      - NAME=postgres
      - USER=postgres
      - PASSWORD=postgres
      - PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0

volumes:
  postgres_data:
